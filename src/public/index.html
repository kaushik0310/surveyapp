<!DOCTYPE html>
<html>
<head>
  <title>Survey Form</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .question {
      font-weight: 600;
      margin-top: 15px;
      color: #444;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    /* ⭐ STAR RATING */
    .stars {
      display: flex;
      gap: 8px;
      font-size: 30px;
      cursor: pointer;
      margin-top: 10px;
    }

    .stars span {
      color: #ccc;
      transition: 0.2s;
    }

    .stars span.active {
      color: #fbbf24;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
    }

    #successBox {
      display: none;
      text-align: center;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 id="title">📋 Customer Survey</h2>

    <form id="surveyForm">

      <div class="question">1. What is your name?</div>
      <input type="text" id="name" required />

      <div class="question">2. What is your email?</div>
      <input type="email" id="email" required />

      <div class="question">3. How would you rate your experience?</div>
      <div class="stars" id="starContainer">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
      </div>

      <div class="question">4. Additional comments</div>
      <textarea id="response" required></textarea>

      <button type="submit" id="submitBtn">Submit Survey</button>
    </form>

    <div id="successBox">
      <h3>✅ Thank you!</h3>
      <p>Your response has been submitted successfully.</p>
    </div>

    <p id="message"></p>
  </div>

  <script>
    const form = document.getElementById("surveyForm");
    const message = document.getElementById("message");
    const button = document.getElementById("submitBtn");
    const successBox = document.getElementById("successBox");
    const title = document.getElementById("title");

    let selectedRating = 0;

    // ⭐ Star click logic
    const stars = document.querySelectorAll("#starContainer span");

    stars.forEach((star, index) => {
      star.addEventListener("click", () => {
        selectedRating = star.getAttribute("data-value");

        stars.forEach((s, i) => {
          s.classList.toggle("active", i < selectedRating);
        });
      });
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      button.disabled = true;
      button.innerText = "Submitting...";

      if (!selectedRating) {
        message.innerText = "❌ Please select a rating";
        message.className = "error";
        button.disabled = false;
        button.innerText = "Submit Survey";
        return;
      }

      const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        rating: Number(selectedRating),
        response: document.getElementById("response").value
      };

      try {
        const res = await fetch("/api/response", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          form.style.display = "none";
          title.innerText = "🎉 Submission Successful";
          successBox.style.display = "block";
          message.innerText = "";
        } else {
          message.innerText = "❌ " + result.message;
          message.className = "error";
        }
      } catch (err) {
        message.innerText = "❌ Server error";
        message.className = "error";
      }

      button.disabled = false;
      button.innerText = "Submit Survey";
    });
  </script>

</body>
</html>
